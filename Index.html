<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Listing Page</title>
<link rel="stylesheet" href="CallosF.css">
</head>

<body>

<header>
    <h1>Charles's Device store</h1>
    <div class="cart-icon">
        🛒 Cart (<span id="cart-count">0</span>)
    </div>
</header>

<main>
    <section class="products" id="product-list"></section>
    <section class="cart">
        <h2>Shopping Cart</h2>
        <div id="cart-items">
            <p>Your cart is empty.</p>
        </div>

        <h3>Total: ₱<span id="cart-total">0</span></h3>

        <button onclick="clearCart()">Clear Cart</button>
        <button onclick="checkout()">Checkout</button>
        <button onclick="Product()">Push to order</button>
    </section>

</main>

<script src="CallosF.js"></script>
</body>
</html>
